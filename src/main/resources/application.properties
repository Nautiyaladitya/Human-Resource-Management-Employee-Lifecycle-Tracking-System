spring.application.name=hrms-backend

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
server.servlet.context-path=/hrms

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/hrms
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.hrms=DEBUG

# ===============================
# THYMELEAF CONFIGURATION (if UI used)
# ===============================
spring.thymeleaf.cache=false

# ===============================
# FILE UPLOAD (for onboarding docs)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# EMAIL CONFIG (optional ? for notifications)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# SECURITY (Basic - Customize later)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin123

# ===============================
# CUSTOM HRMS CONFIG
# ===============================
hrms.app.name=Employee Lifecycle Tracking System
hrms.app.version=1.0
hrms.leave.default-balance=12